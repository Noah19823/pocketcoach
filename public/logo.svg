<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C94020"/>
      <stop offset="100%" stop-color="#F07A3E"/>
    </linearGradient>
    <radialGradient id="hi" cx="30%" cy="18%" r="55%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="90" fill="url(#bg)"/>
  <rect width="400" height="400" rx="90" fill="url(#hi)"/>

  <!-- Stem -->
  <rect x="108" y="102" width="56" height="202" rx="28" fill="white"/>

  <!-- Bowl: open thick arc, outer R=88, inner r=40, 135° sweep -->
  <path
    d="M 164,102 A 88,88 0 0 1 226,252 A 24,24 0 0 1 192,218 A 40,40 0 0 0 164,150 Z"
    fill="white"
  />
</svg>
